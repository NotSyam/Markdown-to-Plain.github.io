<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to Word Converter Pro</title>
    <script src="https://cdn.tailwindcss.com/3.4.5"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            850: '#151d2f', // Custom darker shade
                            950: '#050914', // Custom darkest shade
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Scrollbar Styling */
        .scrollbar-custom::-webkit-scrollbar { width: 8px; height: 8px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: transparent; }
        
        /* Dark Mode Scrollbar */
        html.dark .scrollbar-custom::-webkit-scrollbar-track { background: #0f172a; }
        html.dark .scrollbar-custom::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        html.dark .scrollbar-custom::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Light Mode Scrollbar */
        html:not(.dark) .scrollbar-custom::-webkit-scrollbar-track { background: #f1f5f9; }
        html:not(.dark) .scrollbar-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        html:not(.dark) .scrollbar-custom::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Preview Content Styling */
        .preview-content { transition: color 0.3s ease; }
        
        /* Headings */
        .preview-content h1 { font-size: 2em; font-weight: 700; margin-bottom: 0.5em; border-bottom: 2px solid var(--border-color); padding-bottom: 0.3em; }
        .preview-content h2 { font-size: 1.5em; font-weight: 600; margin-top: 1em; margin-bottom: 0.5em; }
        .preview-content h3 { font-size: 1.25em; font-weight: 600; margin-top: 0.8em; margin-bottom: 0.4em; }
        .preview-content p { margin-bottom: 1em; line-height: 1.7; }
        .preview-content ul, .preview-content ol { margin-bottom: 1em; padding-left: 1.5em; }
        .preview-content li { margin-bottom: 0.3em; }
        
        /* Code */
        .preview-content code { background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 0.25em; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; color: var(--code-text); }
        .preview-content pre { background: var(--code-bg); padding: 1em; border-radius: 0.5em; overflow-x: auto; margin-bottom: 1em; border: 1px solid var(--border-color); }
        .preview-content pre code { background: transparent; padding: 0; color: var(--text-color); }
        
        /* Blockquote */
        .preview-content blockquote { border-left: 4px solid var(--primary-color); padding-left: 1em; margin: 1em 0; color: var(--text-secondary); font-style: italic; }
        
        /* Links */
        .preview-content a { color: var(--link-color); text-decoration: underline; }
        
        /* Tables - Fixed Visibility */
        .preview-content table { width: 100%; border-collapse: collapse; margin-bottom: 1em; border: 1px solid var(--border-color); }
        .preview-content th, .preview-content td { border: 1px solid var(--border-color); padding: 0.6em; text-align: left; }
        .preview-content th { background: var(--table-header-bg); font-weight: 600; color: var(--table-header-text); }
        .preview-content td { background: var(--table-cell-bg); color: var(--text-color); }
        .preview-content tr:nth-child(even) td { background: var(--table-alt-bg); }
        
        /* HR */
        .preview-content hr { border: none; border-top: 2px solid var(--border-color); margin: 1.5em 0; }
        
        /* Images */
        .preview-content img { max-width: 100%; border-radius: 0.5em; margin: 1em 0; border: 1px solid var(--border-color); }

        /* CSS Variables for Theming */
        html.dark {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: #334155;
            --text-color: #e2e8f0;
            --text-secondary: #94a3b8;
            --code-bg: #1e293b;
            --code-text: #22d3ee;
            --primary-color: #6366f1;
            --link-color: #60a5fa;
            --table-header-bg: #1e293b;
            --table-header-text: #f8fafc;
            --table-cell-bg: #0f172a;
            --table-alt-bg: #162032;
        }
        
        html:not(.dark) {
            --bg-color: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.8);
            --border-color: #cbd5e1;
            --text-color: #334155;
            --text-secondary: #64748b;
            --code-bg: #f1f5f9;
            --code-text: #0369a1;
            --primary-color: #4f46e5;
            --link-color: #2563eb;
            --table-header-bg: #e2e8f0;
            --table-header-text: #0f172a;
            --table-cell-bg: #ffffff;
            --table-alt-bg: #f8fafc;
        }

        /* UI Components */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.2s;
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        
        .btn-gradient-blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .btn-gradient-blue:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .btn-gradient-green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .btn-gradient-green:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        
        .counter-badge {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.2s;
        }

        /* Input Styles */
        .theme-input {
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }
        .theme-input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 1px var(--primary-color);
        }
        .theme-input::placeholder {
            color: var(--text-secondary);
        }

        /* Editor Textarea */
        .editor-textarea {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Animations */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
        }
        .animate-glow { animation: pulse-glow 3s infinite; }
        
        .toast { transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-[var(--bg-color)] text-[var(--text-color)]">

    <!-- Header -->
    <header class="glass-panel border-b border-[var(--border-color)] px-6 py-3 flex items-center justify-between shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg animate-glow">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <div>
                <h1 class="font-bold text-lg tracking-tight text-[var(--text-color)]">Markdown Pro</h1>
                <p class="text-xs text-[var(--text-secondary)]">Convert & Export with ease</p>
            </div>
        </div>
        
        <!-- Filename Input -->
        <div class="flex items-center gap-3 mx-6">
            <label for="filenameInput" class="text-sm text-[var(--text-secondary)] font-medium hidden md:inline">File Name:</label>
            <div class="relative">
                <input type="text" id="filenameInput" value="my-document" 
                       class="theme-input rounded-lg px-3 py-1.5 text-sm w-48 transition-all shadow-sm">
                <div class="absolute right-2 top-1/2 -translate-y-1/2 text-[var(--text-secondary)] pointer-events-none text-xs">
                    .doc
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <!-- Theme Toggle -->
            <button id="themeToggle" class="p-2 rounded-lg hover:bg-[var(--code-bg)] text-[var(--text-secondary)] transition-colors border border-[var(--border-color)]" title="Toggle Theme">
                <!-- Sun Icon (for Light Mode) -->
                <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <!-- Moon Icon (for Dark Mode) -->
                <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>

            <!-- Download Buttons -->
            <button id="downloadDoc" class="btn-gradient px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium text-white whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Word
            </button>
            <button id="downloadPdf" class="btn-gradient-blue px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium text-white whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                PDF
            </button>
            <button id="downloadTxt" class="btn-gradient-green px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium text-white whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                TXT
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Editor Panel -->
        <section class="flex-1 flex flex-col border-r border-[var(--border-color)]">
            <div class="px-4 py-2 border-b border-[var(--border-color)] flex items-center justify-between" style="background: var(--code-bg);">
                <span class="text-sm font-medium flex items-center gap-2" style="color: var(--text-color);">
                    <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Editor Markdown
                </span>
                <button id="clearEditor" class="text-xs hover:text-red-400 transition-colors px-2 py-1 rounded hover:bg-red-400/10" style="color: var(--text-secondary);">
                    Clear
                </button>
            </div>
            <textarea 
                id="markdownInput" 
                class="flex-1 w-full p-6 font-mono text-sm resize-none outline-none scrollbar-custom editor-textarea transition-colors"
                placeholder="Type your markdown here..."
                spellcheck="false"
            ># Welcome to Markdown Pro

## Features
- Convert to **Word**, **PDF**, or **TXT**
- Real-time preview
- Dark & Light Mode

## Example Table

| Feature | Status | Notes |
|---|---|---|
| Live Preview | ✅ Fixed | |
| Tables | ✅ Fixed | Visible now |
| Theme | ✅ Added | Toggle button |

## Example Code

\`\`\`javascript
console.log("Hello World!");
\`\`\`

> This is a blockquote example

---

### Try it now!

Start typing in the editor to see changes.</textarea>
            <!-- Character Counter -->
            <div class="px-4 py-2 border-t border-[var(--border-color)] flex items-center justify-end" style="background: var(--code-bg);">
                <span id="charCount" class="text-xs font-mono opacity-70">0 characters</span>
            </div>
        </section>

        <!-- Preview Panel -->
        <section class="flex-1 flex flex-col bg-[var(--bg-color)]">
            <div class="px-4 py-2 border-b border-[var(--border-color)] flex items-center justify-between" style="background: var(--code-bg);">
                <span class="text-sm font-medium flex items-center gap-2" style="color: var(--text-color);">
                    <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    Preview
                </span>
                <span class="text-xs opacity-50">Arial 11pt</span>
            </div>
            <div id="preview" class="flex-1 p-8 overflow-y-auto scrollbar-custom preview-content text-[var(--text-color)]" style="font-family: Arial, sans-serif; font-size: 11pt; line-height: 1.6;">
                <!-- Preview content will be rendered here -->
            </div>
        </section>
    </main>

    <!-- Stats Bar -->
    <footer class="glass-panel border-t border-[var(--border-color)] px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div class="counter-badge px-3 py-1.5 rounded-lg flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-indigo-400"></div>
                <span class="text-xs font-medium" style="color: var(--text-color);">Words:</span>
                <span id="wordCount" class="text-sm font-bold text-indigo-400 font-mono">0</span>
            </div>
            <div class="counter-badge px-3 py-1.5 rounded-lg flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-cyan-400"></div>
                <span class="text-xs font-medium" style="color: var(--text-color);">Sentences:</span>
                <span id="sentenceCount" class="text-sm font-bold text-cyan-400 font-mono">0</span>
            </div>
            <div class="counter-badge px-3 py-1.5 rounded-lg flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
                <span class="text-xs font-medium" style="color: var(--text-color);">Paragraphs:</span>
                <span id="paragraphCount" class="text-sm font-bold text-emerald-400 font-mono">0</span>
            </div>
        </div>
        <div class="text-xs opacity-50">
            Markdown Pro v2.0
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast fixed bottom-6 right-6 z-50">
        <div class="bg-slate-800 border border-slate-600 text-white px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3">
            <div id="toastIcon" class="w-6 h-6 rounded-full bg-green-500/20 flex items-center justify-center">
                <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <span id="toastMessage" class="text-sm font-medium">Download successful!</span>
        </div>
    </div>

    <script>
        // Initialize Elements
        const markdownInput = document.getElementById('markdownInput');
        const preview = document.getElementById('preview');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const sentenceCount = document.getElementById('sentenceCount');
        const paragraphCount = document.getElementById('paragraphCount');
        const clearBtn = document.getElementById('clearEditor');
        const downloadDocBtn = document.getElementById('downloadDoc');
        const downloadPdfBtn = document.getElementById('downloadPdf');
        const downloadTxtBtn = document.getElementById('downloadTxt');
        const filenameInput = document.getElementById('filenameInput');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const themeToggleBtn = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const htmlElement = document.documentElement;

        // Configure Marked for GFM (GitHub Flavored Markdown) to support tables
        marked.use({
            gfm: true,
            breaks: true
        });

        // --- Theme Logic ---
        function updateThemeIcons() {
            const isDark = htmlElement.classList.contains('dark');
            if (isDark) {
                moonIcon.classList.remove('hidden');
                sunIcon.classList.add('hidden');
            } else {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            updateThemeIcons();
        });

        // --- Core Logic ---
        function getCleanFilename() {
            let name = filenameInput.value.trim();
            name = name.replace(/\.(doc|docx|pdf|txt)$/i, '');
            if (!name) return 'document';
            return name.replace(/[<>:"/\\|?*\x00-\x1F]/g, '_');
        }

        function updateCounts() {
            const text = markdownInput.value;
            
            // Character count
            charCount.textContent = `${text.length} characters`;
            
            // Word count
            const words = text.trim() === '' ? [] : text.trim().split(/\s+/);
            wordCount.textContent = words.length;
            
            // Sentence count
            const sentences = text.match(/[^.!?]*[.!?]+/g) || [];
            sentenceCount.textContent = sentences.length;
            
            // Paragraph count
            const paragraphs = text.split(/\n\n+/).filter(p => p.trim().length > 0);
            paragraphCount.textContent = paragraphs.length;
            
            // Update preview safely
            try {
                preview.innerHTML = marked.parse(text);
            } catch (e) {
                console.error("Markdown parsing error:", e);
                preview.innerHTML = "<p class='text-red-500'>Error parsing markdown.</p>";
            }
        }

        markdownInput.addEventListener('input', updateCounts);
        
        clearBtn.addEventListener('click', () => {
            if (confirm('Clear all content?')) {
                markdownInput.value = '';
                updateCounts();
                showToast('Editor cleared');
            }
        });

        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            const iconContainer = document.getElementById('toastIcon');
            
            if (type === 'success') {
                iconContainer.className = 'w-6 h-6 rounded-full bg-green-500/20 flex items-center justify-center';
                iconContainer.innerHTML = `<svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>`;
            } else {
                iconContainer.className = 'w-6 h-6 rounded-full bg-yellow-500/20 flex items-center justify-center';
                iconContainer.innerHTML = `<svg class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            }

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- Export Functions ---

        // Download as Word
        downloadDocBtn.addEventListener('click', () => {
            const filename = getCleanFilename();
            const content = marked.parse(markdownInput.value);
            
            // Use explicit light-theme styles for Word document to ensure readability
            const html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>${filename}</title>
                    <style>
                        body { font-family: Arial, sans-serif; font-size: 11pt; line-height: 1.6; color: #333; }
                        h1 { font-size: 24pt; font-weight: bold; margin-bottom: 12pt; color: #1e293b; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
                        h2 { font-size: 18pt; font-weight: bold; margin-bottom: 10pt; color: #1e293b; }
                        h3 { font-size: 14pt; font-weight: bold; margin-bottom: 8pt; color: #334155; }
                        p { margin-bottom: 8pt; }
                        pre { background: #f5f5f5; padding: 10pt; font-family: monospace; font-size: 10pt; border: 1px solid #ddd; }
                        code { background: #f5f5f5; padding: 2pt 4pt; font-family: monospace; font-size: 10pt; color: #d93866; }
                        table { border-collapse: collapse; width: 100%; margin-bottom: 10pt; }
                        th, td { border: 1px solid #999; padding: 8pt; text-align: left; }
                        th { background: #e2e8f0; font-weight: bold; color: #000; }
                        td { background: #fff; }
                        tr:nth-child(even) td { background: #f8fafc; }
                        blockquote { border-left: 4px solid #ccc; margin: 10pt 0; padding-left: 10pt; color: #555; font-style: italic; }
                        a { color: #2563eb; text-decoration: underline; }
                        img { max-width: 100%; }
                        hr { border: none; border-top: 2px solid #ccc; margin: 15pt 0; }
                    </style>
                </head>
                <body>
                    ${content}
                </body>
                </html>
            `;
            
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${filename}.doc`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`Word document '${filename}.doc' downloaded!`);
        });

        // Download as PDF
        downloadPdfBtn.addEventListener('click', () => {
            const filename = getCleanFilename();
            
            // Temporary clone for PDF generation to ensure light theme styles
            const clone = preview.cloneNode(true);
            
            // Force light mode styles on the clone for the PDF
            clone.style.backgroundColor = '#ffffff';
            clone.style.color = '#333333';
            
            // Fix table styles for PDF
            const tables = clone.querySelectorAll('table');
            tables.forEach(table => {
                table.style.borderColor = '#cbd5e1';
                const ths = table.querySelectorAll('th');
                ths.forEach(th => {
                    th.style.backgroundColor = '#e2e8f0';
                    th.style.color = '#0f172a';
                    th.style.borderColor = '#cbd5e1';
                });
                const tds = table.querySelectorAll('td');
                tds.forEach(td => {
                    td.style.backgroundColor = '#ffffff';
                    td.style.color = '#334155';
                    td.style.borderColor = '#cbd5e1';
                });
            });

            // Append clone to body off-screen or use html2pdf directly on element with modified styles
            // html2pdf can take an element directly. We will modify the preview temporarily.
            // However, modifying the live preview causes a flash.
            // Better: html2pdf uses a canvas snapshot. We can change styles via CSS before snapshot if possible, 
            // but simplest robust way without flash is to append a hidden div with the content.
            
            const hiddenDiv = document.createElement('div');
            hiddenDiv.innerHTML = preview.innerHTML;
            // Apply classes/styles to hiddenDiv to match the clone logic
            hiddenDiv.className = 'preview-content';
            hiddenDiv.style.fontFamily = 'Arial, sans-serif';
            hiddenDiv.style.fontSize = '11pt';
            hiddenDiv.style.lineHeight = '1.6';
            hiddenDiv.style.backgroundColor = '#ffffff';
            hiddenDiv.style.color = '#333333';
            hiddenDiv.style.position = 'absolute';
            hiddenDiv.style.left = '-9999px';
            hiddenDiv.style.top = '0';
            hiddenDiv.style.width = '800px'; // Fixed width for better rendering
            
            // Re-apply table styles
            hiddenDiv.querySelectorAll('table').forEach(table => {
                table.style.borderCollapse = 'collapse';
                table.style.width = '100%';
                table.querySelectorAll('th').forEach(th => {
                    th.style.border = '1px solid #cbd5e1';
                    th.style.padding = '8px';
                    th.style.backgroundColor = '#e2e8f0';
                    th.style.color = '#0f172a';
                });
                hiddenDiv.querySelectorAll('td').forEach(td => {
                    td.style.border = '1px solid #cbd5e1';
                    td.style.padding = '8px';
                    td.style.backgroundColor = '#ffffff';
                    td.style.color = '#334155';
                });
            });
            
            // Also fix code blocks and other elements
            hiddenDiv.querySelectorAll('pre').forEach(pre => {
                pre.style.backgroundColor = '#f5f5f5';
                pre.style.color = '#333';
                pre.style.border = '1px solid #ddd';
                pre.querySelectorAll('code').forEach(c => {
                    c.style.color = '#333';
                    c.style.backgroundColor = '#f5f5f5';
                });
            });

            document.body.appendChild(hiddenDiv);

            showToast(`Generating '${filename}.pdf'...`);
            
            const opt = {
                margin: 0.5,
                filename: `${filename}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff'
                },
                jsPDF: { 
                    unit: 'in', 
                    format: 'letter', 
                    orientation: 'portrait'
                }
            };
            
            html2pdf().set(opt).from(hiddenDiv).save().then(() => {
                document.body.removeChild(hiddenDiv);
                showToast(`PDF '${filename}.pdf' downloaded!`);
            }).catch(err => {
                document.body.removeChild(hiddenDiv);
                showToast('PDF generation failed!', 'error');
                console.error(err);
            });
        });

        // Download as TXT
        downloadTxtBtn.addEventListener('click', () => {
            const filename = getCleanFilename();
            const text = markdownInput.value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${filename}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`TXT file '${filename}.txt' downloaded!`);
        });

        // Initial Run
        updateThemeIcons();
        updateCounts();
    </script>
</body>
</html>
